name: skn-settlement

# 로컬 개발용 docker-compose.
# 아키텍처(기술명세서 §1.2, §10):
#   React SPA ─► Nginx ─► Django(DRF, SoR) ─► FastAPI(AI Orchestrator + FastMCP + ML)
#   Postgres(확정 데이터 SoT) / Chroma(벡터 RAG)
#   ※ FastAPI(ai)는 내부 전용 — 사용자 트래픽은 Django만 받는다.

services:
  # ── PostgreSQL : 모든 확정 데이터의 SoT ─────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-settlement}
      POSTGRES_USER: ${POSTGRES_USER:-settlement}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-settlement}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-settlement}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Chroma : 규정/사례 임베딩 벡터 스토어(RAG) ──────────────────
  chroma:
    image: chromadb/chroma:latest
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    volumes:
      - chromadata:/data
    ports:
      - "8001:8000"   # host 8001 → chroma 8000

  # ── Django + DRF : Core Backend (SoR, 상태머신, RBAC) ──────────
  core:
    build: ./apps/core
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-insecure-secret-key-change-me}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-*}
      POSTGRES_DB: ${POSTGRES_DB:-settlement}
      POSTGRES_USER: ${POSTGRES_USER:-settlement}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-settlement}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      AI_BASE_URL: http://ai:9000
    volumes:
      - ./apps/core:/app
      - media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  # ── FastAPI : AI Orchestrator + FastMCP + ML(이상탐지) ─────────
  #    내부 전용. Nginx로 노출하지 않는다(9000은 디버깅용 직접 노출).
  ai:
    build: ./apps/ai
    command: uvicorn app.main:app --host 0.0.0.0 --port 9000 --reload
    environment:
      CORE_BASE_URL: http://core:8000
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ./apps/ai:/app
    ports:
      - "9000:9000"
    depends_on:
      - chroma

  # ── React SPA (Vite dev server) ────────────────────────────────
  web:
    build: ./apps/web
    command: npm run dev -- --host 0.0.0.0
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - core

  # ── Nginx : 통합 리버스 프록시(prod-like 진입점) ────────────────
  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - core
      - web

volumes:
  pgdata:
  chromadata:
  media:
